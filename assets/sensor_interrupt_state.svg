<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <marker id="arr" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M1 1 L7 4 L1 7 Z" fill="#52525B"/>
    </marker>
    <marker id="arr-brand" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M1 1 L7 4 L1 7 Z" fill="#4B3FE3"/>
    </marker>
    <marker id="arr-success" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M1 1 L7 4 L1 7 Z" fill="#1DC981"/>
    </marker>
    <marker id="arr-danger" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M1 1 L7 4 L1 7 Z" fill="#E8463A"/>
    </marker>
  </defs>
  <style>
    .title { font: 600 16px/24px "SF Pro Text","PingFang SC",system-ui,sans-serif; fill: #171717; }
    .subtitle { font: 400 12px/18px "SF Pro Text","PingFang SC",system-ui,sans-serif; fill: #52525B; }
    .t { font: 500 13px/20px "SF Pro Text","PingFang SC",system-ui,sans-serif; fill: #171717; }
    .ts { font: 400 11px/16px "SF Pro Text","PingFang SC",system-ui,sans-serif; fill: #52525B; }
    .label { font: 400 11px/16px "SF Pro Text","PingFang SC",system-ui,sans-serif; fill: #52525B; }
    .box { fill: #F7F7F8; stroke: rgba(23,23,23,0.12); stroke-width: 1.5; rx: 8; }
    .box-brand { fill: #F2F7FF; stroke: #4B3FE3; stroke-width: 2; rx: 8; }
    .box-success { fill: color-mix(in srgb,#1DC981 10%,transparent); stroke: #1DC981; stroke-width: 2; rx: 8; }
    .box-danger { fill: color-mix(in srgb,#E8463A 10%,transparent); stroke: #E8463A; stroke-width: 2; rx: 8; }
    .box-warning { fill: color-mix(in srgb,#EFAA17 10%,transparent); stroke: #EFAA17; stroke-width: 2; rx: 8; }
    .conn { stroke: #52525B; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arr); }
    .conn-brand { stroke: #4B3FE3; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arr-brand); }
    .conn-success { stroke: #1DC981; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arr-success); }
    .conn-danger { stroke: #E8463A; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arr-danger); }
    .conn-dashed { stroke: #52525B; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; fill: none; stroke-dasharray: 5 5; marker-end: url(#arr); }
  </style>

  <text x="400" y="32" text-anchor="middle" class="title">霍尔传感器中断处理状态图</text>
  <text x="400" y="52" text-anchor="middle" class="subtitle">药仓开盖检测与服药确认全流程 | GPIO中断 + 500ms消抖</text>

  <!-- ==== Node 1: 待机监测 ==== -->
  <rect x="60" y="90" width="160" height="60" class="box"/>
  <text x="140" y="115" text-anchor="middle" class="t">SENSOR_IDLE</text>
  <text x="140" y="135" text-anchor="middle" class="ts">霍尔传感器待机</text>

  <!-- ==== Node 2: 中断触发 ==== -->
  <rect x="300" y="90" width="160" height="60" class="box-brand"/>
  <text x="380" y="115" text-anchor="middle" class="t">INT_TRIGGERED</text>
  <text x="380" y="135" text-anchor="middle" class="ts">GPIO中断触发 (IRAM)</text>

  <!-- Arrow: 待机 -> 中断触发 -->
  <line x1="220" y1="120" x2="300" y2="120" class="conn-brand"/>
  <text x="260" y="112" text-anchor="middle" class="label">磁场变化</text>

  <!-- ==== Node 3: 消抖等待 ==== -->
  <rect x="540" y="90" width="160" height="60" class="box-warning"/>
  <text x="620" y="115" text-anchor="middle" class="t">DEBOUNCE_WAIT</text>
  <text x="620" y="135" text-anchor="middle" class="ts">500ms消抖计时</text>

  <!-- Arrow: 中断触发 -> 消抖等待 -->
  <line x1="460" y1="120" x2="540" y2="120" class="conn"/>
  <text x="500" y="112" text-anchor="middle" class="label">设置标志位</text>

  <!-- ==== Branch: 消抖结果 ==== -->
  <!-- Arrow down from debounce -->
  <line x1="620" y1="150" x2="620" y2="190" class="conn"/>

  <!-- ==== Node 4a: 确认开盖 ==== -->
  <rect x="460" y="200" width="160" height="60" class="box-success"/>
  <text x="540" y="225" text-anchor="middle" class="t">LID_OPENED</text>
  <text x="540" y="245" text-anchor="middle" class="ts">确认开盖事件</text>

  <!-- Arrow: 消抖 -> 确认开盖 -->
  <line x1="620" y1="190" x2="540" y2="220" class="conn-success"/>
  <text x="600" y="210" text-anchor="end" class="label">状态保持</text>

  <!-- ==== Node 4b: 抖动忽略 ==== -->
  <rect x="660" y="200" width="120" height="50" class="box"/>
  <text x="720" y="225" text-anchor="middle" class="t">NOISE_IGNORE</text>
  <text x="720" y="240" text-anchor="middle" class="ts">忽略抖动</text>

  <!-- Arrow: 消抖 -> 抖动忽略 -->
  <line x1="700" y1="150" x2="720" y2="200" class="conn-dashed"/>
  <text x="740" y="180" text-anchor="start" class="label">状态恢复</text>

  <!-- Arrow back to idle from noise ignore -->
  <path d="M 720 250 Q 720 320 380 320 Q 140 320 140 150" class="conn-dashed" marker-end="url(#arr)"/>
  <text x="400" y="335" text-anchor="middle" class="label">返回待机</text>

  <!-- ==== Node 5: 药仓识别 ==== -->
  <rect x="260" y="200" width="160" height="60" class="box-brand"/>
  <text x="340" y="225" text-anchor="middle" class="t">COMPARTMENT_ID</text>
  <text x="340" y="245" text-anchor="middle" class="ts">识别哪个药仓</text>

  <!-- Arrow: 确认开盖 -> 药仓识别 -->
  <line x1="460" y1="230" x2="420" y2="230" class="conn-brand"/>
  <text x="440" y="222" text-anchor="end" class="label">GPIO4/5/6</text>

  <!-- ==== Node 6: 匹配用药计划 ==== -->
  <rect x="60" y="200" width="160" height="60" class="box"/>
  <text x="140" y="225" text-anchor="middle" class="t">SCHEDULE_MATCH</text>
  <text x="140" y="245" text-anchor="middle" class="ts">匹配当前时段</text>

  <!-- Arrow: 药仓识别 -> 匹配计划 -->
  <line x1="260" y1="230" x2="220" y2="230" class="conn"/>
  <text x="240" y="222" text-anchor="end" class="label">查日程表</text>

  <!-- ==== Branch: 匹配结果 ==== -->
  <line x1="140" y1="260" x2="140" y2="300" class="conn"/>

  <!-- ==== Node 7a: 正常服药 ==== -->
  <rect x="40" y="320" width="140" height="60" class="box-success"/>
  <text x="110" y="345" text-anchor="middle" class="t">INTAKE_VALID</text>
  <text x="110" y="365" text-anchor="middle" class="ts">记录服药日志</text>

  <!-- Arrow: 匹配 -> 正常服药 -->
  <line x1="140" y1="300" x2="110" y2="320" class="conn-success"/>
  <text x="100" y="310" text-anchor="end" class="label">匹配成功</text>

  <!-- ==== Node 7b: 异常开盖 ==== -->
  <rect x="220" y="320" width="140" height="60" class="box-danger"/>
  <text x="290" y="345" text-anchor="middle" class="t">INTAKE_INVALID</text>
  <text x="290" y="365" text-anchor="middle" class="ts">非计划时间开盖</text>

  <!-- Arrow: 匹配 -> 异常开盖 -->
  <line x1="170" y1="300" x2="290" y2="320" class="conn-danger"/>
  <text x="240" y="310" text-anchor="middle" class="label">无匹配</text>

  <!-- ==== Node 8: 状态上报 ==== -->
  <rect x="130" y="420" width="160" height="50" class="box-brand"/>
  <text x="210" y="445" text-anchor="middle" class="t">BLE_NOTIFY</text>
  <text x="210" y="460" text-anchor="middle" class="ts">推送至App</text>

  <!-- Arrow: 正常服药 -> 上报 -->
  <line x1="110" y1="380" x2="170" y2="420" class="conn-brand"/>

  <!-- Arrow: 异常开盖 -> 上报 -->
  <line x1="290" y1="380" x2="250" y2="420" class="conn-brand"/>

  <!-- ==== Node 9: 药盒反馈 ==== -->
  <rect x="380" y="320" width="160" height="60" class="box-success"/>
  <text x="460" y="345" text-anchor="middle" class="t">LED_FEEDBACK</text>
  <text x="460" y="365" text-anchor="middle" class="ts">绿色快闪300ms</text>

  <!-- Arrow: 正常服药 -> LED反馈 -->
  <line x1="180" y1="350" x2="380" y2="350" class="conn-success"/>
  <text x="280" y="342" text-anchor="middle" class="label">服药确认</text>

  <!-- ==== Node 10: 返回待机 ==== -->
  <rect x="620" y="320" width="140" height="50" class="box"/>
  <text x="690" y="345" text-anchor="middle" class="t">RETURN_IDLE</text>
  <text x="690" y="360" text-anchor="middle" class="ts">关闭中断使能</text>

  <!-- Arrow: LED反馈 -> 返回待机 -->
  <line x1="540" y1="350" x2="620" y2="345" class="conn"/>

  <!-- Legend -->
  <rect x="620" y="60" width="160" height="110" rx="8" fill="#fff" stroke="rgba(23,23,23,0.12)" stroke-width="1"/>
  <text x="700" y="78" text-anchor="middle" class="t" font-size="12">图例说明</text>
  <rect x="635" y="88" width="14" height="10" rx="3" fill="#F2F7FF" stroke="#4B3FE3" stroke-width="1.5"/>
  <text x="655" y="97" class="label">中断触发</text>
  <rect x="635" y="105" width="14" height="10" rx="3" fill="color-mix(in srgb,#1DC981 10%,transparent)" stroke="#1DC981" stroke-width="1.5"/>
  <text x="655" y="114" class="label">正常流程</text>
  <rect x="635" y="122" width="14" height="10" rx="3" fill="color-mix(in srgb,#E8463A 10%,transparent)" stroke="#E8463A" stroke-width="1.5"/>
  <text x="655" y="131" class="label">异常路径</text>
  <rect x="635" y="139" width="14" height="10" rx="3" fill="color-mix(in srgb,#EFAA17 10%,transparent)" stroke="#EFAA17" stroke-width="1.5"/>
  <text x="655" y="148" class="label">等待/消抖</text>
</svg>