<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700" height="500">
  <defs>
    <marker id="a" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M1 1 L7 4 L1 7 Z" fill="#52525B"/>
    </marker>
    <marker id="a-brand" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M1 1 L7 4 L1 7 Z" fill="#4B3FE3"/>
    </marker>
    <marker id="a-success" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M1 1 L7 4 L1 7 Z" fill="#1DC981"/>
    </marker>
    <marker id="a-danger" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M1 1 L7 4 L1 7 Z" fill="#E8463A"/>
    </marker>
  </defs>
  <style>
    .title { font: 600 16px/24px "SF Pro Text","PingFang SC",system-ui,sans-serif; fill: #171717; }
    .subtitle { font: 400 12px/18px "SF Pro Text","PingFang SC",system-ui,sans-serif; fill: #52525B; }
    .t { font: 500 13px/20px "SF Pro Text","PingFang SC",system-ui,sans-serif; fill: #171717; }
    .ts { font: 400 11px/16px "SF Pro Text","PingFang SC",system-ui,sans-serif; fill: #52525B; }
    .label { font: 400 11px/16px "SF Pro Text","PingFang SC",system-ui,sans-serif; fill: #52525B; }
    .box { fill: #F7F7F8; stroke: rgba(23,23,23,0.12); stroke-width: 1.5; rx: 8; }
    .box-brand { fill: #F2F7FF; stroke: #4B3FE3; stroke-width: 2; rx: 8; }
    .box-success { fill: color-mix(in srgb,#1DC981 10%,transparent); stroke: #1DC981; stroke-width: 2; rx: 8; }
    .box-danger { fill: color-mix(in srgb,#E8463A 10%,transparent); stroke: #E8463A; stroke-width: 2; rx: 8; }
    .box-warning { fill: color-mix(in srgb,#EFAA17 10%,transparent); stroke: #EFAA17; stroke-width: 2; rx: 8; }
    .c { stroke: #52525B; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#a); }
    .c-brand { stroke: #4B3FE3; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#a-brand); }
    .c-success { stroke: #1DC981; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#a-success); }
    .c-danger { stroke: #E8463A; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#a-danger); }
    .c-dashed { stroke: #52525B; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; fill: none; stroke-dasharray: 5 5; marker-end: url(#a); }
  </style>

  <text x="350" y="32" text-anchor="middle" class="title">系统上电初始化状态图</text>
  <text x="350" y="52" text-anchor="middle" class="subtitle">ESP32-S3 启动流程 | 硬件自检 → 模块初始化 → 进入主循环</text>

  <!-- ==== Node 1: 上电启动 ==== -->
  <circle cx="350" cy="95" r="28" fill="#F2F7FF" stroke="#4B3FE3" stroke-width="2"/>
  <text x="350" y="100" text-anchor="middle" class="t" font-size="12">POWER_ON</text>

  <!-- ==== Node 2: 硬件自检 ==== -->
  <rect x="250" y="150" width="200" height="56" class="box-brand"/>
  <text x="350" y="175" text-anchor="middle" class="t">HW_SELF_TEST</text>
  <text x="350" y="195" text-anchor="middle" class="ts">检测Flash / 传感器 / LED</text>

  <!-- Arrow: 上电 -> 自检 -->
  <line x1="350" y1="123" x2="350" y2="150" class="c-brand"/>

  <!-- ==== Branch: 自检结果 ==== -->
  <line x1="350" y1="206" x2="350" y2="240" class="c"/>

  <!-- ==== Node 3a: 自检通过 ==== -->
  <rect x="180" y="250" width="160" height="50" class="box-success"/>
  <text x="260" y="272" text-anchor="middle" class="t">TEST_PASS</text>
  <text x="260" y="288" text-anchor="middle" class="ts">所有硬件正常</text>

  <!-- Arrow: 自检 -> 通过 -->
  <line x1="350" y1="240" x2="280" y2="260" class="c-success"/>
  <text x="300" y="250" text-anchor="end" class="label">通过</text>

  <!-- ==== Node 3b: 自检失败 ==== -->
  <rect x="400" y="250" width="160" height="50" class="box-danger"/>
  <text x="480" y="272" text-anchor="middle" class="t">TEST_FAIL</text>
  <text x="480" y="288" text-anchor="middle" class="ts">红灯常亮告警</text>

  <!-- Arrow: 自检 -> 失败 -->
  <line x1="420" y1="206" x2="460" y2="250" class="c-danger"/>
  <text x="450" y="230" text-anchor="start" class="label">失败</text>

  <!-- ==== Node 4: Flash读取配置 ==== -->
  <rect x="120" y="340" width="180" height="56" class="box"/>
  <text x="210" y="365" text-anchor="middle" class="t">LOAD_CONFIG</text>
  <text x="210" y="385" text-anchor="middle" class="ts">Preferences读取日程</text>

  <!-- Arrow: 通过 -> 读取配置 -->
  <line x1="260" y1="300" x2="230" y2="340" class="c"/>

  <!-- ==== Node 5: 模块初始化 ==== -->
  <rect x="340" y="340" width="180" height="56" class="box-brand"/>
  <text x="430" y="365" text-anchor="middle" class="t">MODULE_INIT</text>
  <text x="430" y="385" text-anchor="middle" class="ts">BLE / 传感器 / LED</text>

  <!-- Arrow: 读取配置 -> 模块初始化 -->
  <line x1="300" y1="368" x2="340" y2="368" class="c-brand"/>

  <!-- ==== Node 6: BLE广播启动 ==== -->
  <rect x="340" y="430" width="180" height="50" class="box-brand"/>
  <text x="430" y="452" text-anchor="middle" class="t">BLE_ADV_START</text>
  <text x="430" y="468" text-anchor="middle" class="ts">NimBLE GATT Server</text>

  <!-- Arrow: 模块初始化 -> BLE广播 -->
  <line x1="430" y1="396" x2="430" y2="430" class="c-brand"/>

  <!-- ==== Node 7: 主循环 ==== -->
  <circle cx="210" cy="455" r="32" fill="color-mix(in srgb,#1DC981 10%,transparent)" stroke="#1DC981" stroke-width="2"/>
  <text x="210" y="452" text-anchor="middle" class="t" font-size="12">MAIN_LOOP</text>
  <text x="210" y="466" text-anchor="middle" class="ts" font-size="10">20Hz循环</text>

  <!-- Arrow: BLE广播 -> 主循环 -->
  <line x1="340" y1="455" x2="242" y2="455" class="c-success"/>
  <text x="291" y="447" text-anchor="middle" class="label">初始化完成</text>

  <!-- ==== Error recovery ==== -->
  <!-- Arrow from fail to power on (retry) -->
  <path d="M 480 300 Q 550 350 550 200 Q 550 80 400 80" class="c-dashed" marker-end="url(#a)"/>
  <text x="560" y="200" text-anchor="start" class="label">手动重启</text>

  <!-- Legend -->
  <rect x="20" y="380" width="150" height="100" rx="8" fill="#fff" stroke="rgba(23,23,23,0.12)" stroke-width="1"/>
  <text x="95" y="398" text-anchor="middle" class="t" font-size="12">图例说明</text>
  <rect x="32" y="408" width="14" height="10" rx="3" fill="#F2F7FF" stroke="#4B3FE3" stroke-width="1.5"/>
  <text x="52" y="417" class="label">关键步骤</text>
  <rect x="32" y="425" width="14" height="10" rx="3" fill="color-mix(in srgb,#1DC981 10%,transparent)" stroke="#1DC981" stroke-width="1.5"/>
  <text x="52" y="434" class="label">成功路径</text>
  <rect x="32" y="442" width="14" height="10" rx="3" fill="color-mix(in srgb,#E8463A 10%,transparent)" stroke="#E8463A" stroke-width="1.5"/>
  <text x="52" y="451" class="label">失败/告警</text>
  <rect x="32" y="459" width="14" height="10" rx="3" fill="color-mix(in srgb,#EFAA17 10%,transparent)" stroke="#EFAA17" stroke-width="1.5"/>
  <text x="52" y="468" class="label">等待/配置</text>
</svg>